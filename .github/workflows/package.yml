name: Package Desktop

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  package:
    name: Electron package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build Next
        run: npm run build

      - name: Package Electron
        run: npm run electron:pack
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: nodiary-${{ matrix.os }}
          path: release
